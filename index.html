<!-- quiz game with multiple choice questions -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>


<body>
    <h1>
        Quiz Game</h1>

    <!-- category select screen -->
    <div id = "categoryScreen">
    <p>
        Select a mode to begin!
    <br>
    </p>
<div id = "categoryButtons">
    <div class = "categoryCard" id = "sportsCard">
        <button id="sportsButton">Sports</button>
        <img src="sports.jpg" class = "categoryImg">
    </div>
    <div class = "categoryCard" id = "mathCard">
        <button id="mathButton">Math</button>
        <img src="math.jpg" class = "categoryImg">
    </div>
    <div class = "categoryCard" id = "musicCard">
        <button id="musicButton">Music</button>
        <img src="music.jpg" class = "categoryImg">
    </div>
    <div class = "categoryCard" id = "movieCard">
        <button id="movieButton">Movies</button>
        <img src="movies.jpg" class = "categoryImg">
    </div>
    <div class = "categoryCard" id = "scienceCard">
        <button id="scienceButton">Science</button>
        <img src="science.jpg" class = "categoryImg">
    </div>
    <div class = "categoryCard" id = "historyCard">
        <button id="historyButton">History</button>
        <img src="history.jpg" class = "categoryImg">
    </div>
    <div class = "categoryCard" id = "videogamesCard">
        <button id="videogamesButton">Video Games</button>
        <img src="videogames.jpg" class = "categoryImg">
    </div>
</div>
    </div>

    <!-- start screen -->
    <div id = "startScreen">
        <p id = "selectedModeText">You selected: </p>
        <button id="startButton">Start Quiz</button>
    </div>

    <!-- quiz screen -->
    <div id = "quizScreen">
        <div class="myBox">
            <h2> Question </h2>
            <p id="score">Questions answered: 0/10</p>
            <p class="question" id="questionText">
                Click start to begin the quiz!
            </p>
        </div>
        <div id="choicesContainer"></div>
    </div>

</body>
</html>
