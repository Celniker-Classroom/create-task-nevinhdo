<!-- I will be creating a Math quiz with a list of questions and the game chooses a questions for the player to answer -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>
        Math Quiz</h1>
    <p>
        This is the Math Quiz! You will be given 5 random questions to answer. Good luck!
    </p>
    <form id="guessButton">
      <input type="text" id="myInput" placeholder="Guess here... ">
      <button type="submit" id="myButton">Enter</button>
    </form>

    <div class="myBox">
        <h2> Question </h2>
        <p id="score">Questions answered: 0/5;</p>
        <p class="question" id="questionText">
            Loading question...
        </p>
    </div>

</body>
